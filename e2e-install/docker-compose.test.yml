# ClawBox E2E test harness.
#
# Usage:
#   cd e2e-install
#   docker compose -f docker-compose.test.yml build
#   docker compose -f docker-compose.test.yml up -d
#   # ...run tests against http://localhost:${CLAWBOX_PORT:-8080}
#   docker compose -f docker-compose.test.yml down -v    # full teardown
#
# Restart simulation:
#   docker compose -f docker-compose.test.yml restart    # preserves volumes
#
# Builds for the host architecture — no qemu needed. Production is arm64
# (Jetson), and the CI workflow runs on `ubuntu-24.04-arm` to match; local
# dev builds native amd64 for speed.

services:
  clawbox:
    build:
      context: ..
      dockerfile: e2e-install/Dockerfile
    image: clawbox-e2e:latest
    container_name: clawbox-e2e
    # systemd needs cgroups + a handful of capabilities. --privileged is the
    # blunt-but-reliable option that matches what `systemd-nspawn` gets.
    privileged: true
    # cgroup v2 hosts need systemd in the container to share the host's
    # cgroup namespace, otherwise PID 1 dies during setup (exit 255 in <1s).
    cgroup: host
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      # /sys/fs/cgroup is required for systemd-in-Docker (cgroup v2).
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      # Named volume for /home/clawbox/clawbox so install state (data/config.json,
      # .update-branch, .next build cache) survives container restarts — this
      # is what lets us simulate "reboot after update" in tests.
      - clawbox-home:/home/clawbox/clawbox
      # .env.test is NOT mounted into the container. Tests read it from the
      # host (see happy-path.spec.ts:loadEnvTest) and pass credentials through
      # /setup-api/ai-models/configure, which writes them into the container's
      # config on demand. Mounting it caused chown failures during install.
    environment:
      CLAWBOX_TEST_MODE: "1"
      NETWORK_INTERFACE: eth0
      # Override branch target for upgrade tests. Default: install from main.
      CLAWBOX_BRANCH: ${CLAWBOX_BRANCH:-main}
    ports:
      - "${CLAWBOX_PORT:-8080}:80"
      # Expose noVNC websockify so developers can view the Xvfb desktop
      # during browser/VNC tests. CLAWBOX_VNC_PORT defaults to 6080 — the
      # same port a real device exposes.
      - "${CLAWBOX_VNC_PORT:-6080}:6080"
    # Health check polls the setup API so Playwright can `wait-for-healthy`
    # instead of blind sleeping.
    healthcheck:
      test:
        - CMD-SHELL
        - |
          curl -fsS -o /dev/null http://127.0.0.1/setup-api/setup/status \
            && ! test -f /home/clawbox/clawbox/.needs-install
      interval: 10s
      timeout: 5s
      retries: 240
      start_period: 60s
    stop_grace_period: 30s

volumes:
  clawbox-home:
