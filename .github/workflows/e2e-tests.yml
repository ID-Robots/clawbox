name: E2E Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache Playwright browser binaries between runs (~250MB Chromium download).
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      # Cache hit skips --with-deps, so install only the system libs separately.
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run E2E tests with coverage
        id: e2e
        run: bun run test:e2e:coverage
        env:
          CI: "1"

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload E2E coverage summary
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage
          path: |
            coverage/e2e-summary.json
            coverage/e2e-bundles.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test-results (traces, screenshots)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

  comment:
    # Skip for fork PRs: GITHUB_TOKEN is always read-only on fork PRs regardless
    # of repo/workflow permissions, so the comment would 403. Native PR checks
    # UI already shows the same status.
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    needs: e2e
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Comment PR
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          E2E_RESULT: ${{ needs.e2e.result }}
        with:
          script: |
            const marker = '<!-- clawbox-ci-summary -->';
            const testsStart = '<!-- clawbox-ci-tests:start -->';
            const testsEnd = '<!-- clawbox-ci-tests:end -->';
            const e2eStart = '<!-- clawbox-ci-e2e:start -->';
            const e2eEnd = '<!-- clawbox-ci-e2e:end -->';
            const ok = process.env.E2E_RESULT === 'success';
            const icon = ok ? '✅' : '❌';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const wrappedSection = `${e2eStart}\n## ${icon} E2E\n- Result: **${ok ? 'passed' : 'failed'}**\n- [View run](${runUrl})\n${e2eEnd}`;
            const defaultBody = `${marker}\n# CI Summary\n\n${testsStart}\n## ⏳ Tests\n- Waiting for test workflow to finish.\n${testsEnd}\n\n${wrappedSection}`;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: context.issue.number, per_page: 100 });
            const existing = comments.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));

            const updateSection = (body, start, end, replacement) => {
              const pattern = new RegExp(`${start}[\\s\\S]*?${end}`);
              return pattern.test(body) ? body.replace(pattern, replacement) : `${body}\n\n${replacement}`;
            };

            const body = existing
              ? updateSection(existing.body, e2eStart, e2eEnd, wrappedSection)
              : defaultBody;

            if (existing) await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number: context.issue.number, body });
