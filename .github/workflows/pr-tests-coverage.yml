name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"

      - name: Install
        id: install
        continue-on-error: true
        run: bun install --frozen-lockfile

      - name: Test
        id: tests
        if: always()
        continue-on-error: true
        run: |
          bun run test:coverage 2>&1 | tee test-output.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Parse coverage
        id: coverage
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json','utf8')).total;
              const w = (k,v) => require('fs').appendFileSync(process.env.GITHUB_OUTPUT, k+'='+v+'\n');
              w('found','true');
              w('statements',s.statements.pct);
              w('branches',s.branches.pct);
              w('functions',s.functions.pct);
              w('lines',s.lines.pct);
            "
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          INSTALL_OK: ${{ steps.install.outcome }}
          TEST_EXIT: ${{ steps.tests.outputs.exit_code }}
          COV_FOUND: ${{ steps.coverage.outputs.found }}
          COV_STMT: ${{ steps.coverage.outputs.statements }}
          COV_BR: ${{ steps.coverage.outputs.branches }}
          COV_FN: ${{ steps.coverage.outputs.functions }}
          COV_LN: ${{ steps.coverage.outputs.lines }}
        with:
          script: |
            const marker = '<!-- clawbox-tests -->';
            const ok = process.env.INSTALL_OK === 'success' && process.env.TEST_EXIT === '0';
            const icon = ok ? '✅' : '❌';
            const cov = process.env.COV_FOUND === 'true'
              ? `\n### Coverage\n- Statements: **${process.env.COV_STMT}%**\n- Branches: **${process.env.COV_BR}%**\n- Functions: **${process.env.COV_FN}%**\n- Lines: **${process.env.COV_LN}%**`
              : '';
            const body = `${marker}\n## ${icon} Test Report\n- Install: **${process.env.INSTALL_OK}**\n- Tests: **${ok ? 'passed' : 'failed'}**${cov}\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            const {owner, repo} = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {owner, repo, issue_number: context.issue.number, per_page: 100});
            const existing = comments.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) await github.rest.issues.updateComment({owner, repo, comment_id: existing.id, body});
            else await github.rest.issues.createComment({owner, repo, issue_number: context.issue.number, body});

      - name: Fail if tests failed
        if: ${{ steps.install.outcome != 'success' || steps.tests.outputs.exit_code != '0' }}
        run: exit 1
