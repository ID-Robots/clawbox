name: PR Tests and Coverage

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  test-and-comment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        id: tests
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set +e
          bun run test:coverage 2>&1 | tee test-output.log
          code=${PIPESTATUS[0]}
          if [ "$code" -eq 0 ]; then
            status="passed"
          else
            status="failed"
          fi
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Parse coverage summary
        id: coverage
        if: always()
        shell: bash
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node <<'NODE'
const fs = require('fs');
const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8')).total;
const out = process.env.GITHUB_OUTPUT;
const write = (k, v) => fs.appendFileSync(out, `${k}=${v}\n`);
write('found', 'true');
write('statements', summary.statements.pct);
write('branches', summary.branches.pct);
write('functions', summary.functions.pct);
write('lines', summary.lines.pct);
NODE
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "statements=N/A" >> "$GITHUB_OUTPUT"
            echo "branches=N/A" >> "$GITHUB_OUTPUT"
            echo "functions=N/A" >> "$GITHUB_OUTPUT"
            echo "lines=N/A" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
          TEST_EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
          COVERAGE_FOUND: ${{ steps.coverage.outputs.found }}
          COVERAGE_STATEMENTS: ${{ steps.coverage.outputs.statements }}
          COVERAGE_BRANCHES: ${{ steps.coverage.outputs.branches }}
          COVERAGE_FUNCTIONS: ${{ steps.coverage.outputs.functions }}
          COVERAGE_LINES: ${{ steps.coverage.outputs.lines }}
        with:
          script: |
            const marker = '<!-- clawbox-pr-tests-coverage -->';
            const installOutcome = process.env.INSTALL_OUTCOME || 'unknown';
            const testStatus = process.env.TEST_STATUS || 'failed';
            const testExitCode = process.env.TEST_EXIT_CODE || '1';
            const coverageFound = process.env.COVERAGE_FOUND === 'true';

            const passed = installOutcome === 'success' && testStatus === 'passed' && testExitCode === '0';
            const icon = passed ? '✅' : '❌';
            const statusText = passed ? 'Passed' : 'Failed';

            const coverageBlock = coverageFound
              ? [
                  `- Statements: **${process.env.COVERAGE_STATEMENTS}%**`,
                  `- Branches: **${process.env.COVERAGE_BRANCHES}%**`,
                  `- Functions: **${process.env.COVERAGE_FUNCTIONS}%**`,
                  `- Lines: **${process.env.COVERAGE_LINES}%**`,
                ].join('\n')
              : '- Coverage report not generated.';

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              marker,
              `## ${icon} PR Test Report`,
              `- Status: **${statusText}**`,
              `- Install step: **${installOutcome}**`,
              `- Test exit code: **${testExitCode}**`,
              '',
              '### Coverage',
              coverageBlock,
              '',
              `[View workflow run](${runUrl})`,
            ].join('\n');

            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.user?.type === 'Bot' && c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail workflow when tests fail
        if: ${{ steps.install.outcome != 'success' || steps.tests.outputs.exit_code != '0' }}
        run: |
          echo "Install outcome: ${{ steps.install.outcome }}"
          echo "Test status: ${{ steps.tests.outputs.status }} (exit ${{ steps.tests.outputs.exit_code }})"
          exit 1
